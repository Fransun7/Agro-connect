<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Landing Page</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-gray-50">
    <nav
      id="navigation"
      class="bg-white grid grid-cols-[30%_70%] md:grid-cols-[15%_45%_40%] text-white fixed top-0 left-0  pt-5 gap-2 w-full items-center px-3 py-1 z-50 shadow-md md:px-10"
    >
      <!-- logo container -->
      <div id="logo-div" class="flex items-center justify-center gap-2 p-2">

        <div class="flex md:hidden">
        <!-- hamburger -->
        <button id="hamburger" class="text-gray-700 focus:outline-none flex justify-end">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-6 w-6"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M4 6h16M4 12h16M4 18h16"
            />
          </svg>
        </button>
</div>

        <img src="./logo.png" alt="" />
        
      </div>

      <!-- search input hidden on mobile -->
      <!-- From Uiverse.io by RashadGhzi -->
      <div
        class="hidden md:flex w-full bg-white rounded-lg font-mono justify-end items-center"
      >
        <input
          class="text-sm custom-input w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm transition duration-300 ease-in-out transform focus:-translate-y-1 focus:outline-blue-300 hover:shadow-lg hover:border-blue-300 bg-gray-100"
          placeholder="Enter text here"
          type="text"
          id="unique-input"
        />
      </div>

      <!-- menu, hidden on desktop -->
      <div class="flex md:hidden items-center justify-end gap-10">
        <a href="">
         <div
          class="flex justify-center items-center gap-12 h-full text-green-800"
        >
          <div
            class="bg-gradient-to-b from-stone-300/40 to-transparent p-[4px] rounded-[16px]"
          >
            <button
              class="group p-[4px] rounded-[12px] bg-gradient-to-b from-white to-stone-200/40 shadow-[0_1px_3px_rgba(0,0,0,0.5)] active:shadow-[0_0px_1px_rgba(0,0,0,0.5)] active:scale-[0.995]"
            >
              <div
                class="bg-gradient-to-b from-stone-200/40 to-white/80 rounded-[8px] px-1 py-1"
              >
                <div class="flex gap-2 items-center">
                  <span class="font-semibold text-base">Get Started</span>
                </div>
              </div>
            </button>
          </div>
        </div>
        </a>

        
      </div>

      <!--right menu hidden on mobile -->
      <div class="basis-[40%] hidden md:flex items-center justify-end gap-8">
        <a
          href="#"
          class="text-gray-700 text-sm font-medium hover:bg-green-600 hover:rounded-full hover:text-white hover:px-4 py-2"
          >Home</a
        >
        <a
          href="#"
          class="text-gray-700 text-sm font-medium hover:bg-green-600 hover:rounded-full hover:text-white hover:px-4 py-2"
          >Products</a
        >
        <a
          href="#"
          class="text-gray-700 text-sm font-medium hover:bg-green-600 hover:rounded-full hover:text-white hover:px-4 py-2"
          >Dashboard</a
        >
        <a
          href="#"
          class="text-gray-700 text-sm font-medium hover:bg-green-600 hover:rounded-full hover:text-white hover:px-4 py-2"
          >Login</a
        >
  <!-- right menu on mobile -->
        <div
          class="flex justify-center items-center gap-12 h-full text-green-800"
        >
          <div
            class="bg-gradient-to-b from-stone-300/40 to-transparent p-[4px] rounded-[16px]"
          >
            <button
              class="group p-[1px] rounded-[12px] bg-gradient-to-b from-white to-stone-200/40 shadow-[0_1px_3px_rgba(0,0,0,0.5)] active:shadow-[0_0px_1px_rgba(0,0,0,0.5)] active:scale-[0.995]"
            >
              <div
                class="bg-gradient-to-b from-stone-200/40 to-white/80 rounded-[8px] px-1 py-1"
              >
                <div class="flex gap-2 items-center">
                  <span class="font-semibold text-base">Get Started</span>
                </div>
              </div>
            </button>
          </div>
        </div>
      </div>
    </nav>

<!-- side menu -->
<div id="sideMenu" class="fixed top-0 left-0 h-full w-64 bg-white z-50 shadow-lg transform -translate-x-full transition-transform duration-300 ease-in-out">

   <!-- close button -->
  <div class="flex justify-end p-4">
    <button id="close-button" class="text-gray-700">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </div>

  <div class="flex justify-center">
    <img class="w-[100px]" src="./logo.png" alt="" />
  </div>
 

    <nav class="flex flex-col px-6 gap-6 mt-4">
    <a href="#" class="flex items-center gap-3 text-gray-700 text-sm font-medium hover:text-green-600">
  <i class="fa-solid fa-house"></i> Home
</a>
<a href="#" class="flex items-center gap-3 text-gray-700 text-sm font-medium hover:text-green-600">
  <i class="fa-solid fa-box"></i> Products
</a>
<a href="#" class="flex items-center gap-3 text-gray-700 text-sm font-medium hover:text-green-600">
  <i class="fa-solid fa-gauge"></i> Dashboard
</a>
<a href="#" class="flex items-center gap-3 text-gray-700 text-sm font-medium hover:text-green-600">
  <i class="fa-solid fa-right-to-bracket"></i> Login
</a>
<a href="#" class="flex items-center gap-3 text-gray-700 text-sm font-medium hover:text-green-600">
  <i class="fa-solid fa-user-plus"></i> Sign Up
</a>
  </nav>

</div>

    
    <script src="./script.js"></script>
  </body>
</html
